{# Language switcher for multi-language documentation builds. #}
{# Sphinx 8+ normalises language to BCP 47 (e.g. zh-CN), so match both forms. #}
{% set is_chinese = language and ("zh" in language) %}
<div class="dropdown">
  <button
    class="btn btn-sm btn-outline-primary dropdown-toggle"
    type="button"
    id="doc-language-switcher"
    data-bs-toggle="dropdown"
    aria-expanded="false"
  >
    {% if is_chinese %}简体中文{% else %}English{% endif %}
  </button>
  <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="doc-language-switcher">
    {% for lang_item in supported_doc_languages %}
      <li>
        <a class="dropdown-item doc-lang-link" href="#" data-lang="{{ lang_item.code }}">
          {{ lang_item.label }}
        </a>
      </li>
    {% endfor %}
  </ul>
</div>
<script>
  (function () {
    // English lives at the root (no language prefix).
    // Chinese lives under zh_CN/ inside the same version root.
    // URL examples:
    //   English: /MagiAttention/docs/main/user_guide/install.html
    //   Chinese: /MagiAttention/docs/main/zh_CN/user_guide/install.html
    var ZH_SEGMENT = "zh_CN";

    function versionRoot() {
      // Returns the path up to and including the version/branch segment
      // (i.e. everything up to and including "main", "v1.1.0", etc.)
      // by looking for the known parent prefix.
      var pathname = window.location.pathname || "";
      var marker = "/docs/";
      var idx = pathname.indexOf(marker);
      if (idx === -1) return null;
      // Find the next slash after the version segment.
      var afterDocs = pathname.indexOf("/", idx + marker.length);
      return afterDocs === -1 ? pathname : pathname.slice(0, afterDocs + 1);
    }

    function resolvePath(targetLang) {
      var pathname = window.location.pathname || "";
      var query = window.location.search || "";
      var hash = window.location.hash || "";
      var root = versionRoot();  // e.g. "/MagiAttention/docs/main/"
      if (!root) return "#";

      var afterRoot = pathname.slice(root.length);  // e.g. "user_guide/install.html"
                                                    //  or "zh_CN/user_guide/install.html"

      // Strip existing zh_CN prefix if present
      if (afterRoot.startsWith(ZH_SEGMENT + "/")) {
        afterRoot = afterRoot.slice(ZH_SEGMENT.length + 1);
      }

      if (targetLang === "en") {
        return root + afterRoot + query + hash;
      } else {
        return root + ZH_SEGMENT + "/" + afterRoot + query + hash;
      }
    }

    var links = document.querySelectorAll(".doc-lang-link");
    for (var i = 0; i < links.length; i++) {
      var targetLang = links[i].getAttribute("data-lang");
      links[i].setAttribute("href", resolvePath(targetLang));
    }
  })();
</script>
